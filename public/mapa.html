<script>
  // Firebase REST API - no SDK, no eval
  const FIREBASE_PROJECT = "prode-mundial-202";
  const FIREBASE_API_KEY = "AIzaSyCZ2ijjaotfBxIFFGnG2fwYi4NTYTeTKfQ";

  async function dbGet(key) {
    try {
      const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents/prode/${key}?key=${FIREBASE_API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) return null;
      const data = await res.json();
      if (!data.fields || !data.fields.value) return null;
      // Parse Firestore value field
      const val = data.fields.value;
      if (val.stringValue !== undefined) {
        try { return JSON.parse(val.stringValue); } catch { return val.stringValue; }
      }
      if (val.mapValue) return parseFirestoreMap(val.mapValue);
      return null;
    } catch(e) { console.error("dbGet error:", e); return null; }
  }

  function parseFirestoreMap(mapVal) {
    if (!mapVal || !mapVal.fields) return {};
    const result = {};
    for (const [k, v] of Object.entries(mapVal.fields)) {
      result[k] = parseFirestoreValue(v);
    }
    return result;
  }

  function parseFirestoreValue(v) {
    if (v.stringValue !== undefined) { try { return JSON.parse(v.stringValue); } catch { return v.stringValue; } }
    if (v.integerValue !== undefined) return parseInt(v.integerValue);
    if (v.doubleValue !== undefined) return parseFloat(v.doubleValue);
    if (v.booleanValue !== undefined) return v.booleanValue;
    if (v.mapValue) return parseFirestoreMap(v.mapValue);
    if (v.arrayValue) return (v.arrayValue.values || []).map(parseFirestoreValue);
    if (v.nullValue !== undefined) return null;
    return null;
  }

  async function loadData() {
    const [users, results] = await Promise.all([dbGet("users"), dbGet("results")]);
    const allPreds = {};
    const champions = {};
    const approvedIds = users ? Object.keys(users).filter(id => users[id] && users[id].approved) : [];
    await Promise.all(approvedIds.map(async id => {
      const p = await dbGet(`preds-${id}`);
      if (p) allPreds[id] = p;
    }));
    const avance = await dbGet("avance");

    window.__PRODE_DATA = {
      users: users || {},
      results: results || {},
      allPreds,
      champions,
      avance: avance || {},
      currentUser: JSON.parse(localStorage.getItem("prode-session") || "null")?.user || ""
    };
    window.__DATA_LOADED = true;
    document.dispatchEvent(new Event("prode-data-ready"));
  }

  loadData().catch(console.error);
</script>

// Deterministic pseudo-random so it looks "real" every reload
function seed(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return () => {
    h += 0x6D2B79F5;
    let t = h;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function hexToRgb(h) {
  const x = h.replace("#", "");
  return [parseInt(x.slice(0, 2), 16), parseInt(x.slice(2, 4), 16), parseInt(x.slice(4, 6), 16)];
}
function rgbToHex(r, g, b) {
  const c = v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, "0");
  return "#" + c(r) + c(g) + c(b);
}
function heat(t, palette) {
  if (t <= 0) return palette.stops[0];
  if (t >= 1) return palette.stops[palette.stops.length - 1];
  const n = palette.stops.length - 1;
  const i = Math.floor(t * n);
  const f = t * n - i;
  const [r1, g1, b1] = hexToRgb(palette.stops[i]);
  const [r2, g2, b2] = hexToRgb(palette.stops[i + 1]);
  return rgbToHex(r1 + (r2 - r1) * f, g1 + (g2 - g1) * f, b1 + (b2 - b1) * f);
}

// Stats computation

function computeTeamStats({
  allPreds,
  users,
  groupFilter,
  participantFilter,
  dataMode,
  currentUser,
  champions
}) {
  const stats = {};
  // init all teams
  M.forEach(m => {
    [m.h, m.a].forEach(t => {
      if (!stats[t]) stats[t] = {
        wins: 0,
        draws: 0,
        losses: 0,
        voters: [],
        champVotes: 0,
        perMatch: {}
      };
    });
  });
  if (dataMode === "campeon") {
    // each user picks ONE champion
    const userIds = participantFilter === "all" ? Object.keys(users).filter(id => users[id].approved) : [participantFilter].filter(id => users[id]);
    userIds.forEach(uid => {
      const t = champions[uid];
      if (t && stats[t]) {
        stats[t].champVotes++;
        stats[t].voters.push({
          name: users[uid].name,
          kind: "campeón"
        });
      }
    });
    return stats;
  }

  // consensus / single user → count predicted winners per match
  const matches = groupFilter === "all" ? M : M.filter(m => m.g === groupFilter);
  const userIds = participantFilter === "all" ? Object.keys(users).filter(id => users[id].approved) : [participantFilter].filter(id => users[id]);
  matches.forEach(m => {
    userIds.forEach(uid => {
      const p = (allPreds[uid] || {})[m.n] || {
        h: "",
        a: ""
      };
      if (p.h === "" || p.a === "") return;
      const ph = +p.h,
        pa = +p.a;
      const u = users[uid];
      if (ph > pa) {
        stats[m.h].wins++;
        stats[m.h].voters.push({
          name: u.name,
          match: `${m.h} ${ph}-${pa} ${m.a}`,
          group: m.g
        });
        stats[m.a].losses++;
      } else if (ph < pa) {
        stats[m.a].wins++;
        stats[m.a].voters.push({
          name: u.name,
          match: `${m.h} ${ph}-${pa} ${m.a}`,
          group: m.g
        });
        stats[m.h].losses++;
      } else {
        stats[m.h].draws++;
        stats[m.a].draws++;
      }
    });
  });
  return stats;
}
