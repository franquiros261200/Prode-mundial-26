<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCZ2ijjaotfBxIFFGnG2fwYi4NTYTeTKfQ",
    authDomain: "prode-mundial-202.firebaseapp.com",
    projectId: "prode-mundial-202",
    storageBucket: "prode-mundial-202.firebasestorage.app",
    messagingSenderId: "641198744773",
    appId: "1:641198744773:web:e2ff6ef13c61e5739a7cac"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function dbGet(key) {
    try {
      const snap = await getDoc(doc(db, "prode", key));
      return snap.exists() ? snap.data().value : null;
    } catch(e) { console.error(e); return null; }
  }

  // Load all data from Firebase
  async function loadData() {
    const [users, results] = await Promise.all([
      dbGet("users"),
      dbGet("results"),
    ]);

    const allPreds = {};
    const champions = {};
    const approvedIds = users ? Object.keys(users).filter(id => users[id].approved) : [];

    // Load preds for all approved users in parallel
    await Promise.all(approvedIds.map(async id => {
      const p = await dbGet(`preds-${id}`);
      if (p) allPreds[id] = p;
      if (users[id].champion) champions[id] = users[id].champion;
    }));

    window.__PRODE_DATA = {
      users: users || {},
      results: results || {},
      allPreds,
      champions,
      currentUser: JSON.parse(localStorage.getItem("prode-session") || "null")?.user || ""
    };

    window.__DATA_LOADED = true;
    document.dispatchEvent(new Event("prode-data-ready"));
  }

  loadData().catch(console.error);
</script>

// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys тЖТ host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react тАФ the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// Floating shell. Registers the protocol listener BEFORE announcing
// availability тАФ if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message тАФ authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage тАФ
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;

function hexToRgb(h){ const x=h.replace(тАЭ#тАЭ,тАЭтАЭ); return [parseInt(x.slice(0,2),16),parseInt(x.slice(2,4),16),parseInt(x.slice(4,6),16)]; }
function rgbToHex(r,g,b){ const c=v=>Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,тАЬ0тАЭ); return тАЬ#тАЭ+c(r)+c(g)+c(b); }
function heat(t, palette){
if (t<=0) return palette.stops[0];
if (t>=1) return palette.stops[palette.stops.length-1];
const n = palette.stops.length-1;
const i = Math.floor(t*n);
const f = (t*n) - i;
const [r1,g1,b1] = hexToRgb(palette.stops[i]);
const [r2,g2,b2] = hexToRgb(palette.stops[i+1]);
return rgbToHex(r1+(r2-r1)*f, g1+(g2-g1)*f, b1+(b2-b1)*f);
}

function computeTeamStats({allPreds, users, groupFilter, participantFilter, dataMode, currentUser, champions}){
const stats = {};
// init all teams
M.forEach(m=>{
[m.h,m.a].forEach(t=>{ if(!stats[t]) stats[t]={wins:0,draws:0,losses:0,voters:[],champVotes:0,perMatch:{}}; });
});

if (dataMode === тАЬcampeonтАЭ){
// each user picks ONE champion
const userIds = participantFilter===тАЬallтАЭ
? Object.keys(users).filter(id=>users[id].approved)
: [participantFilter].filter(id=>users[id]);
userIds.forEach(uid=>{
const t = champions[uid];
if (t && stats[t]) { stats[t].champVotes++; stats[t].voters.push({name:users[uid].name, kind:тАЬcampe├│nтАЭ}); }
});
return stats;
}

// consensus / single user тЖТ count predicted winners per match
const matches = groupFilter===тАЬallтАЭ ? M : M.filter(m=>m.g===groupFilter);
const userIds = participantFilter===тАЬallтАЭ
? Object.keys(users).filter(id=>users[id].approved)
: [participantFilter].filter(id=>users[id]);

matches.forEach(m=>{
userIds.forEach(uid=>{
const p = (allPreds[uid]||{})[m.n] || {h:тАЭтАЭ,a:тАЭтАЭ};
if (p.h===тАЭтАЭ || p.a===тАЭтАЭ) return;
const ph=+p.h, pa=+p.a;
const u = users[uid];
if (ph>pa){
stats[m.h].wins++;
stats[m.h].voters.push({name:u.name, match:`${m.h} ${ph}-${pa} ${m.a}`, group:m.g});
stats[m.a].losses++;
} else if (ph<pa){
stats[m.a].wins++;
stats[m.a].voters.push({name:u.name, match:`${m.h} ${ph}-${pa} ${m.a}`, group:m.g});
stats[m.h].losses++;
} else {
stats[m.h].draws++; stats[m.a].draws++;
}
});
});
